<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 320px;
      padding: 15px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Helvetica Neue', sans-serif;
      margin: 0;
    }
    h1 {
      font-size: 16px;
      margin-top: 0;
      color: #333;
    }
    .memo-status {
      margin: 15px 0;
      padding: 12px;
      background-color: #f5f5f5;
      border-radius: 8px;
    }
    .actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 15px;
    }
    button {
      padding: 10px;
      background-color: #7c4dff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s ease;
    }
    button:hover {
      background-color: #6a3de8;
      transform: translateY(-1px);
    }
    button:disabled {
      background-color: #b4a7d6;
      cursor: not-allowed;
      transform: none;
    }
    .secondary {
      background-color: #f5f5f5;
      color: #444;
      border: 1px solid #ddd;
    }
    .secondary:hover {
      background-color: #eaeaea;
    }
    .divider {
      height: 1px;
      background-color: #eee;
      margin: 15px 0;
    }
    .saved-sites {
      max-height: 200px;
      overflow-y: auto;
    }
    .site-list {
      list-style-type: none;
      padding: 0;
      margin: 0;
    }
    .site-item {
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      margin-bottom: 10px;
      padding: 12px;
      background: white;
    }
    .site-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .site-domain {
      font-weight: 500;
      color: #333;
    }
    .site-domain a {
      color: #7c4dff;
      text-decoration: none;
    }
    .site-domain a:hover {
      text-decoration: underline;
    }
    .site-content {
      color: #666;
      font-size: 13px;
    }
    .site-date {
      display: block;
      color: #999;
      font-size: 12px;
      margin-top: 4px;
    }
    .delete-site {
      padding: 4px 8px;
      background: #ff4d4f;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      transition: background-color 0.2s;
    }
    .delete-site:hover {
      background: #ff7875;
    }
    h2 {
      font-size: 14px;
      margin: 15px 0 10px 0;
      color: #555;
    }
    .empty-list {
      color: #888;
      font-style: italic;
      text-align: center;
      padding: 15px 0;
    }
    /* 滚动条样式 */
    .saved-sites::-webkit-scrollbar {
      width: 8px;
    }
    .saved-sites::-webkit-scrollbar-track {
      background: #f1f1f1;
      border-radius: 4px;
    }
    .saved-sites::-webkit-scrollbar-thumb {
      background: #c5c5c5;
      border-radius: 4px;
    }
    .saved-sites::-webkit-scrollbar-thumb:hover {
      background: #a0a0a0;
    }
    /* 添加导入导出按钮样式 */
    .backup-actions {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }
    
    .backup-btn {
      flex: 1;
      padding: 8px;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      background-color: #f0e6ff;
      color: #7c4dff;
      border: 1px solid #e6d8ff;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .backup-btn:hover {
      background-color: #e6d8ff;
      transform: translateY(-1px);
    }
    
    .backup-btn svg {
      width: 16px;
      height: 16px;
    }
  </style>
</head>
<body>
  <h1>网站备忘录</h1>
  <div class="memo-status" id="status">
    正在检查当前网站的备忘录状态...
  </div>
  
  <h2>已保存的备忘录站点</h2>
  <div class="saved-sites">
    <ul class="site-list" id="siteList">
      <!-- 站点列表将通过JavaScript动态添加 -->
    </ul>
    <div id="emptyList" class="empty-list" style="display: none;">
      暂无保存的备忘录
    </div>
  </div>
  
  <div class="divider"></div>
  
  <h2>数据备份</h2>
  <div class="backup-actions">
    <button id="exportDataBtn" class="backup-btn">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
      </svg>
      导出数据
    </button>
    <button id="importDataBtn" class="backup-btn">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
      </svg>
      导入数据
    </button>
  </div>
  
  <!-- 放在最后，用于导入文件的隐藏input -->
  <input type="file" id="fileInput" style="display: none;" accept=".json">
  
  <script src="popup.js"></script>
</body>
</html>
