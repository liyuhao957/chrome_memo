<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>备忘录模板管理</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Helvetica Neue', sans-serif;
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      background: #f5f7fa;
    }

    .template-item {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    .template-item:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }
    
    .template-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }
    
    .template-title {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .template-icon {
      font-size: 20px;
    }
    
    .template-name {
      font-size: 18px;
      font-weight: 600;
      color: #7c4dff;
    }
    
    .template-date {
      color: #888;
      font-size: 14px;
    }
    
    .template-preview {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 15px;
      margin: 15px 0;
      color: #444;
      font-size: 14px;
      line-height: 1.6;
    }
    
    .template-actions {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }
    
    .action-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }
    
    .edit-template {
      background: #f0e6ff;
      color: #7c4dff;
    }
    
    .use-template {
      background: #e3f2fd;
      color: #1976d2;
    }
    
    .delete-template {
      background: #fee;
      color: #d32f2f;
    }
    
    .action-btn:hover {
      filter: brightness(0.95);
      transform: translateY(-1px);
    }
    
    .btn-icon {
      font-size: 16px;
    }
    
    .preview-content {
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* 创建按钮样式 */
    #createTemplateBtn {
      background: #7c4dff;
      color: white;
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 30px;
      box-shadow: 0 2px 8px rgba(124, 77, 255, 0.2);
    }

    #createTemplateBtn:hover {
      background: #6a3de8;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(124, 77, 255, 0.3);
    }

    /* 编辑器样式优化 */
    .template-editor {
      background: white;
      border-radius: 12px;
      padding: 25px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      margin-bottom: 30px;
    }

    .input-group input,
    .input-group textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.2s;
    }

    .input-group input:focus,
    .input-group textarea:focus {
      outline: none;
      border-color: #7c4dff;
      box-shadow: 0 0 0 3px rgba(124, 77, 255, 0.1);
    }

    .empty-list {
      text-align: center;
      padding: 40px 20px;
      background: white;
      border-radius: 12px;
      color: #666;
    }
  </style>
</head>
<body>
  <h1>备忘录模板管理</h1>
  
  <button id="createTemplateBtn">创建新模板</button>
  
  <div id="templateEditor" class="template-editor" style="display: none;">
    <div class="input-group">
      <label for="templateName">模板名称：</label>
      <input type="text" id="templateName" placeholder="请输入模板名称">
    </div>
    <div class="input-group">
      <label for="templateContent">模板内容：</label>
      <textarea id="templateContent" placeholder="请输入模板内容"></textarea>
    </div>
    <div class="template-actions">
      <button id="cancelEditBtn" class="secondary">取消</button>
      <button id="saveTemplateBtn" class="primary">保存模板</button>
    </div>
  </div>
  
  <div id="templateList" class="template-list">
    <!-- 模板列表将通过 JavaScript 动态添加 -->
  </div>
  <div id="emptyTemplates" class="empty-list" style="display: none;">
    暂无保存的模板
  </div>
  
  <script src="templates.js"></script>
</body>
</html>
